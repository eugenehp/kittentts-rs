# ── Cross-compilation linker config ─────────────────────────────────────────
#
# Zig ships a built-in C cross-compiler that works as a drop-in linker for
# every target Rust supports. cargo-zigbuild wraps Cargo's normal build
# with zig cc as the linker, removing the need for platform-specific MinGW or
# musl-cross toolchains on the host.

[target.x86_64-pc-windows-gnu]
# cargo-zigbuild supplies the Windows linker automatically.
# Manual builds: RUSTFLAGS="-C linker=x86_64-w64-mingw32-gcc" cargo build --target …

[target.x86_64-unknown-linux-gnu]
# cargo-zigbuild supplies the GNU/glibc cross-linker automatically.

[target.x86_64-unknown-linux-musl]
# cargo-zigbuild supplies the musl cross-linker automatically.
